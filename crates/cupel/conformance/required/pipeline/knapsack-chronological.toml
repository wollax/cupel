[test]
name = "Pipeline: knapsack slice with chronological placement"
stage = "pipeline"

# 3 items scored by priority, sliced by knapsack, placed chronologically.
# Budget: target=300, max=1000, reserve=0, bucket_size=100.
#
# Score (PriorityScorer):
#   countWithPriority = 3, denominator = 2.
#   "alpha" (priority 2): rank 0 → 0.0
#   "beta"  (priority 5): rank 1 → 0.5
#   "gamma" (priority 8): rank 2 → 1.0
#
# Sort: gamma(1.0), beta(0.5), alpha(0.0)
#
# Slice (Knapsack, target=300, bucket=100):
#   candidates (all non-zero tokens):
#     gamma: tokens=250, value=max(0,floor(1.0*10000))=10000, dw=ceil(250/100)=3
#     beta:  tokens=150, value=max(0,floor(0.5*10000))=5000,  dw=ceil(150/100)=2
#     alpha: tokens=200, value=max(0,floor(0.0*10000))=0,     dw=ceil(200/100)=2
#   capacity = floor(300/100) = 3
#
#   DP:
#     gamma (i=0, dw=3, dv=10000):
#       w=3: dp[0]+10000=10000 > 0 → dp[3]=10000, keep[0][3]=true
#     beta (i=1, dw=2, dv=5000):
#       w=3: dp[1]+5000=5000 < 10000 → no change
#       w=2: dp[0]+5000=5000 > 0 → dp[2]=5000, keep[1][2]=true
#     alpha (i=2, dw=2, dv=0):
#       w=3: dp[1]+0=0 < 10000 → no change
#       w=2: dp[0]+0=0 < 5000 → no change
#
#   Reconstruct from capacity=3:
#     i=2: keep[2][3]=false → skip
#     i=1: keep[1][3]=false → skip
#     i=0: keep[0][3]=true → select gamma, remaining=0
#   Selected: gamma
#
# Place (Chronological):
#   Single item → [gamma]

[budget]
max_tokens = 1000
target_tokens = 300
output_reserve = 0

[config]
slicer = "knapsack"
placer = "chronological"
deduplication = true
bucket_size = 100

[[config.scorers]]
type = "priority"
weight = 1.0

[[items]]
content = "alpha"
tokens = 200
kind = "Message"
priority = 2
timestamp = 2024-01-01T00:00:00Z

[[items]]
content = "beta"
tokens = 150
kind = "Message"
priority = 5
timestamp = 2024-06-01T00:00:00Z

[[items]]
content = "gamma"
tokens = 250
kind = "Message"
priority = 8
timestamp = 2024-12-01T00:00:00Z

[[expected_output]]
content = "gamma"
