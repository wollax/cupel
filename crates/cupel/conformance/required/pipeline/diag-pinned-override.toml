[test]
name = "Pipeline diagnostics: PinnedOverride exclusion reason"
stage = "pipeline"

# Budget: target=150, max=1000, reserve=0; overflow_strategy=truncate.
#
# Items:
#   "pinned-item":  pinned=true,  tokens=120, kind=SystemPrompt  (no timestamp)
#   "regular-item": pinned=false, tokens=80,  kind=Message, timestamp=Jun
#
# Classify:
#   pinned  = ["pinned-item"  (120 tokens)]
#   scoreable = ["regular-item" (80 tokens)]
#   Validation: pinned_tokens=120 ≤ max_tokens-output_reserve=1000-0=1000 → ok
#
# Score (RecencyScorer):
#   regular-item (Jun): only scoreable item with timestamp → score=1.0
#
# Slice (Greedy):
#   effective_max    = max_tokens - output_reserve - pinned_tokens = 1000 - 0 - 120 = 880
#   effective_target = min(target - pinned_tokens, effective_max)
#                    = min(150 - 120, 880) = min(30, 880) = 30
#   regular-item: tokens=80 > effective_target=30 → NOT selected
#   sliced = []
#
# Place (Chronological, overflow_strategy=truncate):
#   merged = [pinned-item (score=1.0, tokens=120)]
#   merged_tokens = 120 ≤ target = 150 → no overflow triggered at Place
#   Chronological: pinned-item has no timestamp → placed last (only item)
#   Output: [pinned-item]
#
# ── S03 Diagnostics Note ────────────────────────────────────────────────────
# PinnedOverride is the intended exclusion reason for regular-item under the
# S03 diagnostics layer. The item was effectively displaced by the pinned item
# consuming budget: effective_target = 150 - 120 = 30 < 80 = regular-item tokens.
#
# In the current pipeline implementation the exclusion happens at the Slice
# stage (not Place/Truncate) because compute_effective_budget already
# subtracts pinned tokens before the slicer runs. With Greedy + pinned tokens,
# merged_tokens ≤ target is guaranteed, so the Place/Truncate overflow path
# is never reached for this scenario.
#
# The S03 diagnostics implementation should classify this Slice-stage
# BudgetExceeded exclusion as PinnedOverride when the available budget was
# consumed by pinned items (i.e., effective_target < item_tokens because
# pinned_tokens > 0), setting displaced_by to the content of the pinned item
# that consumed the budget.
# ────────────────────────────────────────────────────────────────────────────
#
# Expected diagnostics:
#   included: pinned-item  (score=1.0, reason=Pinned)
#   excluded: regular-item (score=1.0, reason=PinnedOverride, displaced_by="pinned-item")
#   summary: total_candidates=2, total_tokens_considered=200 (120+80)

[budget]
max_tokens = 1000
target_tokens = 150
output_reserve = 0

[config]
slicer = "greedy"
placer = "chronological"
deduplication = false
overflow_strategy = "truncate"

[[config.scorers]]
type = "recency"
weight = 1.0

[[items]]
content = "pinned-item"
tokens = 120
kind = "SystemPrompt"
pinned = true

[[items]]
content = "regular-item"
tokens = 80
kind = "Message"
timestamp = 2024-06-01T00:00:00Z

[[expected_output]]
content = "pinned-item"

[expected.diagnostics.summary]
total_candidates = 2
total_tokens_considered = 200

[[expected.diagnostics.included]]
content = "pinned-item"
score_approx = 1.0
inclusion_reason = "Pinned"

[[expected.diagnostics.excluded]]
content = "regular-item"
score_approx = 1.0
exclusion_reason = "PinnedOverride"
displaced_by = "pinned-item"
