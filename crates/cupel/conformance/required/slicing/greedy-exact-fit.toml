[test]
name = "GreedySlice selects items that exactly fill budget"
stage = "slicing"
slicer = "greedy"

# Budget: 300 tokens.
# Items that exactly fill the budget when selected by density.
#
# Items:
#   "a": tokens=100, score=0.9 → density = 0.009
#   "b": tokens=100, score=0.8 → density = 0.008
#   "c": tokens=100, score=0.7 → density = 0.007
#   "d": tokens=100, score=0.6 → density = 0.006
#
# Sorted by density: a, b, c, d
# Greedy fill: a (remaining=200), b (remaining=100), c (remaining=0), d (0 < 100 → skip)

[budget]
target_tokens = 300

[[scored_items]]
content = "a"
tokens = 100
score = 0.9

[[scored_items]]
content = "b"
tokens = 100
score = 0.8

[[scored_items]]
content = "c"
tokens = 100
score = 0.7

[[scored_items]]
content = "d"
tokens = 100
score = 0.6

[expected]
selected_contents = ["a", "b", "c"]
