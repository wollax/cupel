[test]
name = "CountConstrainedKnapsackSlice: tag non-exclusivity — require 1 of each of two kinds, satisfied independently"
stage = "slicing"
slicer = "count_constrained_knapsack"

# Budget: 1000 tokens.
# Policy: require_count=1 for "tool", require_count=1 for "memory". bucket_size=100.
#
# Each kind has its own independent require constraint. A "tool" item satisfies
# the tool requirement; a "memory" item satisfies the memory requirement.
# Both requirements are satisfied independently without either displacing the other.
#
# Items:
#   item-tool   (kind="tool",   score=0.9, 100t) — satisfies tool require
#   item-memory (kind="memory", score=0.8, 100t) — satisfies memory require
#   item-extra  (kind="tool",   score=0.5, 100t) — extra candidate, passed to Phase 2
#
# Phase 1 (Require-Satisfy):
#   "tool":   require 1 → commits item-tool (0.9). satisfied=1=require.
#   "memory": require 1 → commits item-memory (0.8). satisfied=1=require.
#   pre_alloc_tokens = 200. residual budget = 800.
#
# Phase 2 (KnapsackSlice): candidates = [item-extra (0.5, 100t)].
#   KnapsackSlice selects item-extra (fits in 800t residual).
#
# Phase 3 (Cap-Enforce): selected_count["tool"]=1 after Phase 1, then item-extra → 2. cap=4. All pass.
#
# Expected: all 3 items selected. No shortfalls. No cap exclusions.

[config]
inner_slicer = "knapsack"
bucket_size = 100
scarcity_behavior = "degrade"

[[config.entries]]
kind = "tool"
require_count = 1
cap_count = 4

[[config.entries]]
kind = "memory"
require_count = 1
cap_count = 4

[budget]
target_tokens = 1000

[[scored_items]]
content = "item-tool"
tokens = 100
score = 0.9
kind = "tool"

[[scored_items]]
content = "item-memory"
tokens = 100
score = 0.8
kind = "memory"

[[scored_items]]
content = "item-extra"
tokens = 100
score = 0.5
kind = "tool"

[expected]
selected_contents = ["item-tool", "item-memory", "item-extra"]
shortfall_count = 0
cap_excluded_count = 0
