[test]
name = "MetadataTrustScorer: cupel:trust key absent → score equals default_score"
stage = "scoring"
scorer = "metadata_trust"

[[items]]
content = "no-trust-key"
tokens = 10

[[expected]]
content = "no-trust-key"
score_approx = 0.5

[tolerance]
score_epsilon = 1e-9

[config]
default_score = 0.5
