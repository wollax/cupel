[test]
name = "DecayScorer Window: age exactly at maxAge returns 0.0 (half-open boundary)"
stage = "scoring"
scorer = "decay"

# referenceTime = 2025-01-01T12:00:00Z
# item timestamp  = 2025-01-01T06:00:00Z  →  age = 6 h
# maxAge = 6 h  →  age >= maxAge (6h >= 6h) → score = 0.0

[[items]]
content = "boundary-item"
tokens = 100
timestamp = 2025-01-01T06:00:00Z

[[expected]]
content = "boundary-item"
score_approx = 0.0

[tolerance]
score_epsilon = 1e-9

[config]
reference_time = 2025-01-01T12:00:00Z

[config.curve]
type = "window"
max_age_secs = 21600.0
