[test]
name = "DecayScorer Exponential: one half-life age scores 0.5"
stage = "scoring"
scorer = "decay"

# referenceTime = 2025-01-01T12:00:00Z
# item timestamp  = 2024-12-31T12:00:00Z  →  age = 24 h
# halfLife = 24 h  →  score = 2^(−1) = 0.5

[[items]]
content = "day-old-item"
tokens = 100
timestamp = 2024-12-31T12:00:00Z

[[expected]]
content = "day-old-item"
score_approx = 0.5

[tolerance]
score_epsilon = 1e-9

[config]
reference_time = 2025-01-01T12:00:00Z

[config.curve]
type = "exponential"
half_life_secs = 86400.0
