[test]
name = "MetadataTrustScorer: cupel:trust present and valid → score equals parsed value"
stage = "scoring"
scorer = "metadata_trust"

[[items]]
content = "trusted-item"
tokens = 10
metadata = { "cupel:trust" = "0.85" }

[[expected]]
content = "trusted-item"
score_approx = 0.85

[tolerance]
score_epsilon = 1e-9

[config]
default_score = 0.5
