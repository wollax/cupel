[test]
name = "MetadataTrustScorer: cupel:trust value is not a valid f64 → score equals default_score"
stage = "scoring"
scorer = "metadata_trust"

[[items]]
content = "bad-trust-value"
tokens = 10
metadata = { "cupel:trust" = "high" }

[[expected]]
content = "bad-trust-value"
score_approx = 0.5

[tolerance]
score_epsilon = 1e-9

[config]
default_score = 0.5
