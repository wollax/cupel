[test]
name = "ChronologicalPlacer sorts null-timestamp items to end"
stage = "placing"
placer = "chronological"

# Timestamped items sort first (ascending), null-timestamp items sort last
# preserving original input order.

[[items]]
content = "no-time-a"
tokens = 100
score = 0.5

[[items]]
content = "recent"
tokens = 100
score = 0.9
timestamp = 2024-12-01T00:00:00Z

[[items]]
content = "no-time-b"
tokens = 100
score = 0.3

[[items]]
content = "old"
tokens = 100
score = 0.7
timestamp = 2024-01-01T00:00:00Z

[expected]
ordered_contents = ["old", "recent", "no-time-a", "no-time-b"]
