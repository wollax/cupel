[test]
name = "CountConstrainedKnapsackSlice: baseline — require 2 of kind tool, knapsack selects residual"
stage = "slicing"
slicer = "count_constrained_knapsack"

# Budget: 1000 tokens. Each item = 100 tokens.
# Policy: require_count=2, cap_count=4 for kind "tool". bucket_size=100.
#
# Phase 1 (Require-Satisfy): commits top-2 by score for "tool" →
#   tool-a (0.9) + tool-b (0.7). pre_alloc_tokens = 200. residual budget = 800.
#
# Phase 2 (KnapsackSlice): candidates = [msg-x (0.5, 100t)].
#   KnapsackSlice selects msg-x (fits in 800-token residual).
#
# Phase 3 (Cap-Enforce): selected_count["tool"] = 2. cap = 4. All pass.
#
# Expected: all 3 items selected. No shortfalls. No cap exclusions.

[config]
inner_slicer = "knapsack"
bucket_size = 100
scarcity_behavior = "degrade"

[[config.entries]]
kind = "tool"
require_count = 2
cap_count = 4

[budget]
target_tokens = 1000

[[scored_items]]
content = "tool-a"
tokens = 100
score = 0.9
kind = "tool"

[[scored_items]]
content = "tool-b"
tokens = 100
score = 0.7
kind = "tool"

[[scored_items]]
content = "msg-x"
tokens = 100
score = 0.5
kind = "msg"

[expected]
selected_contents = ["tool-a", "tool-b", "msg-x"]
shortfall_count = 0
cap_excluded_count = 0
