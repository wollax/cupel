[test]
name = "CountQuotaSlice: scarcity degrade — require_count=3, only 1 candidate; shortfall recorded"
stage = "slicing"
slicer = "count_quota"

# Budget: 1000 tokens. Each item = 100 tokens.
# Policy: require_count=3, cap_count=5 for kind "tool".
# ScarcityBehavior: degrade (default).
#
# Phase 1 (Count-Satisfy): candidate pool for "tool" = 1 item.
#   Commits tool-a (0.9). satisfied_count = 1 < require_count = 3.
#   → shortfall recorded: { kind: "tool", required_count: 3, satisfied_count: 1 }.
#   pre_alloc_tokens = 100. residual budget = 900.
#
# Phase 2 (Budget-Distribute): remaining = [] (no items left).
#   GreedySlice selects nothing.
#
# Expected: 1 item selected (tool-a). shortfall_count = 1. No cap exclusions.

[config]
inner_slicer = "greedy"
scarcity_behavior = "degrade"

[[config.entries]]
kind = "tool"
require_count = 3
cap_count = 5

[budget]
target_tokens = 1000

[[scored_items]]
content = "tool-a"
tokens = 100
score = 0.9
kind = "tool"

[expected]
selected_contents = ["tool-a"]
shortfall_count = 1
cap_excluded_count = 0
