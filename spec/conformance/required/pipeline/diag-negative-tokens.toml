[test]
name = "Pipeline diagnostics: NegativeTokens exclusion reason"
stage = "pipeline"

# Budget: target=500, max=1000, reserve=0.
#
# Items:
#   "neg-item":    tokens=-5,  kind=Message, timestamp=Jan
#   "normal-item": tokens=100, kind=Message, timestamp=Jun
#
# Classify:
#   neg-item:    tokens=-5 < 0  → rejected immediately (continue); never scored
#   normal-item: tokens=100 ≥ 0 → scoreable
#
# Score (RecencyScorer, only 1 surviving timestamped item):
#   normal-item (Jun): countWithTimestamp=1 → score=1.0
#
# Slice (Greedy, effective target=500):
#   Density: normal-item = 1.0/100 = 0.01
#   normal-item: 100 ≤ 500 → selected
#
# Place (Chronological):
#   merged = [normal-item (score=1.0, tokens=100)]
#   merged_tokens=100 ≤ target=500 → no overflow
#   Output: [normal-item]
#
# Expected diagnostics:
#   included: normal-item (score=1.0, reason=Scored)
#   excluded: neg-item (score=0.0, reason=NegativeTokens, tokens=-5)
#   summary: total_candidates=2, total_tokens_considered=95 (100 + (-5))

[budget]
max_tokens = 1000
target_tokens = 500
output_reserve = 0

[config]
slicer = "greedy"
placer = "chronological"
deduplication = false

[[config.scorers]]
type = "recency"
weight = 1.0

[[items]]
content = "neg-item"
tokens = -5
kind = "Message"
timestamp = 2024-01-01T00:00:00Z

[[items]]
content = "normal-item"
tokens = 100
kind = "Message"
timestamp = 2024-06-01T00:00:00Z

[[expected_output]]
content = "normal-item"

[expected.diagnostics.summary]
total_candidates = 2
total_tokens_considered = 95

[[expected.diagnostics.included]]
content = "normal-item"
score_approx = 1.0
inclusion_reason = "Scored"

[[expected.diagnostics.excluded]]
content = "neg-item"
score_approx = 0.0
exclusion_reason = "NegativeTokens"
tokens = -5
