[test]
name = "Pipeline diagnostics: Scored inclusion reason (both items included)"
stage = "pipeline"

# Budget: target=500, max=1000, reserve=0.
#
# Items:
#   "older-item": tokens=50, kind=Message, timestamp=Jan
#   "newer-item": tokens=50, kind=Message, timestamp=Jun
#
# Both items are non-pinned, both fit comfortably in budget.
# Verifies that Scored is the correct inclusion_reason for all sliced items
# and that RecencyScorer produces correct score_approx values (0.0 / 1.0).
#
# Classify:
#   Both items: tokens=50 ≥ 0, not pinned → scoreable
#
# Score (RecencyScorer, 2 timestamped items, denominator=1):
#   older-item (Jan): rank=0 → 0.0 / 1 = 0.0
#   newer-item (Jun): rank=1 → 1.0 / 1 = 1.0
#
# Sort (score descending):
#   [newer-item (1.0), older-item (0.0)]
#
# Slice (Greedy, effective target=500):
#   Density sort:
#     newer-item: 1.0/50=0.02  → selected (remaining=450)
#     older-item: 0.0/50=0.0   → 50 ≤ 450 → selected (remaining=400)
#   sliced = [newer-item, older-item]
#
# Place (Chronological):
#   merged = [newer-item (score=1.0), older-item (score=0.0)]
#   merged_tokens = 100 ≤ 500 → no overflow
#   Chronological sort by timestamp ascending:
#     older-item (Jan) → first
#     newer-item (Jun) → second
#   Output: [older-item, newer-item]
#
# Expected diagnostics:
#   included: older-item (score=0.0, reason=Scored),
#             newer-item (score=1.0, reason=Scored)   — in placed order
#   excluded: (none)
#   summary: total_candidates=2, total_tokens_considered=100 (50+50)

[budget]
max_tokens = 1000
target_tokens = 500
output_reserve = 0

[config]
slicer = "greedy"
placer = "chronological"
deduplication = false

[[config.scorers]]
type = "recency"
weight = 1.0

[[items]]
content = "older-item"
tokens = 50
kind = "Message"
timestamp = 2024-01-01T00:00Z

[[items]]
content = "newer-item"
tokens = 50
kind = "Message"
timestamp = 2024-06-01T00:00Z

[[expected_output]]
content = "older-item"

[[expected_output]]
content = "newer-item"

[expected.diagnostics.summary]
total_candidates = 2
total_tokens_considered = 100

[[expected.diagnostics.included]]
content = "older-item"
score_approx = 0.0
inclusion_reason = "Scored"

[[expected.diagnostics.included]]
content = "newer-item"
score_approx = 1.0
inclusion_reason = "Scored"
