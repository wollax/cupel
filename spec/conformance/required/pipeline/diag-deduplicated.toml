[test]
name = "Pipeline diagnostics: Deduplicated exclusion reason"
stage = "pipeline"

# Budget: target=500, max=1000, reserve=0.
#
# Items:
#   "dup-content": tokens=50, kind=Message, timestamp=Jan  (older copy; will be removed)
#   "dup-content": tokens=50, kind=Message, timestamp=Jun  (newer copy; will survive)
#
# Both items share byte-exact content, so the Deduplicate stage keeps only the
# highest-scored copy.
#
# Classify:
#   Both items: tokens=50 ≥ 0, not pinned → scoreable
#
# Score (RecencyScorer, 2 timestamped items, denominator=1):
#   Jan copy: rank=0 → 0.0 / 1 = 0.0
#   Jun copy: rank=1 → 1.0 / 1 = 1.0
#
# Deduplicate (deduplication=true):
#   content "dup-content" appears twice.
#   Jan(0.0) vs Jun(1.0): Jun wins (higher score).
#   Jan copy excluded with reason=Deduplicated, deduplicated_against="dup-content".
#
# Sort: [Jun copy (1.0)]
#
# Slice (Greedy, effective target=500):
#   dup-content (Jun, 50 tokens): density=1.0/50=0.02; 50 ≤ 500 → selected
#
# Place (Chronological):
#   merged = [dup-content (Jun, score=1.0, tokens=50)]
#   merged_tokens=50 ≤ 500 → no overflow
#   Output: [dup-content]
#
# Expected diagnostics:
#   included: dup-content (Jun, score=1.0, reason=Scored)
#   excluded: dup-content (Jan, score=0.0, reason=Deduplicated,
#             deduplicated_against="dup-content")
#   summary: total_candidates=2, total_tokens_considered=100 (50+50)

[budget]
max_tokens = 1000
target_tokens = 500
output_reserve = 0

[config]
slicer = "greedy"
placer = "chronological"
deduplication = true

[[config.scorers]]
type = "recency"
weight = 1.0

[[items]]
content = "dup-content"
tokens = 50
kind = "Message"
timestamp = 2024-01-01T00:00Z

[[items]]
content = "dup-content"
tokens = 50
kind = "Message"
timestamp = 2024-06-01T00:00Z

[[expected_output]]
content = "dup-content"

[expected.diagnostics.summary]
total_candidates = 2
total_tokens_considered = 100

[[expected.diagnostics.included]]
content = "dup-content"
score_approx = 1.0
inclusion_reason = "Scored"

[[expected.diagnostics.excluded]]
content = "dup-content"
score_approx = 0.0
exclusion_reason = "Deduplicated"
deduplicated_against = "dup-content"
