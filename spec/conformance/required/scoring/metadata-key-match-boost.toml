[test]
name = "MetadataKeyScorer: key matches configured value → score equals boost"
stage = "scoring"
scorer = "metadata_key"

[[items]]
content = "high-priority-item"
tokens = 10
metadata = { "cupel:priority" = "high" }

[[expected]]
content = "high-priority-item"
score_approx = 1.5

[tolerance]
score_epsilon = 1e-9

[config]
key = "cupel:priority"
value = "high"
boost = 1.5
