[test]
name = "TagScorer scores items by tag weight overlap"
stage = "scoring"
scorer = "tag"

# Configured tags: "important" = 3.0, "recent" = 2.0, "archived" = 1.0
# totalWeight = 6.0
#
# "full match": tags ["important", "recent", "archived"] → (3+2+1)/6 = 1.0
# "partial match": tags ["important"] → 3/6 = 0.5
# "small match": tags ["archived"] → 1/6 ≈ 0.166667
# "no match": tags ["other"] → 0/6 = 0.0

[[config.tag_weights]]
tag = "important"
weight = 3.0

[[config.tag_weights]]
tag = "recent"
weight = 2.0

[[config.tag_weights]]
tag = "archived"
weight = 1.0

[[items]]
content = "full match"
tokens = 100
tags = ["important", "recent", "archived"]

[[items]]
content = "partial match"
tokens = 100
tags = ["important"]

[[items]]
content = "small match"
tokens = 100
tags = ["archived"]

[[items]]
content = "no match"
tokens = 100
tags = ["other"]

[[expected]]
content = "full match"
score_approx = 1.0

[[expected]]
content = "partial match"
score_approx = 0.5

[[expected]]
content = "small match"
score_approx = 0.166666666666667

[[expected]]
content = "no match"
score_approx = 0.0

[tolerance]
score_epsilon = 1e-9
