name: Publish to NuGet

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run — pack and test without publishing'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./nupkg

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkg

  consumption-tests:
    runs-on: ubuntu-latest
    needs: pack
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: ./nupkg

      - name: Copy packages to local source
        run: |
          mkdir -p tests/Wollax.Cupel.ConsumptionTests/packages
          cp ./nupkg/*.nupkg tests/Wollax.Cupel.ConsumptionTests/packages/

      - name: Run consumption tests
        run: dotnet test tests/Wollax.Cupel.ConsumptionTests/ --configuration Release

  publish:
    runs-on: ubuntu-latest
    needs: consumption-tests
    if: ${{ inputs.dry-run != true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: ./nupkg

      - name: NuGet OIDC login
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: wollax

      - name: Push to NuGet
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Get version
        id: version
        run: |
          VERSION=$(dotnet msbuild -getProperty:Version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
