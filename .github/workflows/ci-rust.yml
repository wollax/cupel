name: CI (Rust)

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/ci-rust.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/ci-rust.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/cupel -> target"

      - name: Format
        run: cargo fmt --check --manifest-path crates/cupel/Cargo.toml

      - name: Clippy (default features)
        run: cargo clippy --manifest-path crates/cupel/Cargo.toml -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --all-features --manifest-path crates/cupel/Cargo.toml -- -D warnings

      - name: Test (default features)
        run: cargo test --manifest-path crates/cupel/Cargo.toml

      - name: Test (all features)
        run: cargo test --all-features --manifest-path crates/cupel/Cargo.toml

      - name: Deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: crates/cupel/Cargo.toml
