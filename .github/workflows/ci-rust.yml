name: CI (Rust)

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/ci-rust.yml'
      - 'spec/**'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/ci-rust.yml'
      - 'spec/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/cupel -> target"

      - name: Conformance drift guard
        shell: bash
        run: |
          checked=0
          for category in required optional; do
            spec="spec/conformance/${category}"
            crate="crates/cupel/conformance/${category}"
            if [ -d "$spec" ] && [ -d "$crate" ]; then
              diff -rq "$spec" "$crate" \
                || { echo "ERROR: Conformance drift detected in ${category}/ — spec and crates copies have diverged."; diff -r "$spec" "$crate" || true; exit 1; }
              checked=$((checked + 1))
            elif [ -d "$spec" ] || [ -d "$crate" ]; then
              echo "ERROR: Asymmetric conformance directories — only one of ${spec} or ${crate} exists."; exit 1
            fi
          done
          if [ "$checked" -eq 0 ]; then
            echo "WARNING: No conformance directories found to compare."
          else
            echo "Conformance vectors in sync (${checked} categories checked)."
          fi

      - name: Format
        run: cargo fmt --check --manifest-path crates/cupel/Cargo.toml

      - name: Clippy (default features)
        run: cargo clippy --manifest-path crates/cupel/Cargo.toml -- -D warnings

      - name: Clippy (serde)
        run: cargo clippy --features serde --manifest-path crates/cupel/Cargo.toml -- -D warnings

      - name: Test (default features)
        run: cargo test --manifest-path crates/cupel/Cargo.toml

      - name: Test (serde)
        run: cargo test --features serde --manifest-path crates/cupel/Cargo.toml

      - name: Deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: crates/cupel/Cargo.toml
