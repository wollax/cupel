name: Publish cupel-otel to crates.io

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run — test and verify without publishing'
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --manifest-path crates/cupel-otel/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path crates/cupel-otel/Cargo.toml

      - name: Deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: crates/cupel-otel/Cargo.toml

      - name: Verify package contents
        run: cargo package --manifest-path crates/cupel-otel/Cargo.toml --list

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    needs: test
    if: ${{ inputs.dry-run != true }}
    environment: release
    steps:
      - name: Verify running from main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Release workflow must be run from the main branch, not ${{ github.ref }}"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Get version
        id: version
        run: |
          VERSION=$(cargo metadata --manifest-path crates/cupel-otel/Cargo.toml --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "cupel-otel") | .version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Failed to extract version from Cargo.toml"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-io-auth
        continue-on-error: true

      - name: Publish to crates.io
        run: cargo publish --manifest-path crates/cupel-otel/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cupel-otel-v${{ steps.version.outputs.version }}
          name: cupel-otel v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: false
