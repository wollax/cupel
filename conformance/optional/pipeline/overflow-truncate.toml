[budget]
max_tokens = 1000
target_tokens = 250
output_reserve = 0

[config]
slicer = "greedy"
placer = "chronological"
deduplication = true
overflow_strategy = "truncate"

[[config.scorers]]
type = "recency"
weight = 1.0

[[items]]
content = "pinned-sys"
tokens = 150
kind = "SystemPrompt"
pinned = true

[[items]]
content = "msg-a"
tokens = 100
kind = "Message"
timestamp = 2024-12-01T00:00:00Z

[[items]]
content = "msg-b"
tokens = 100
kind = "Message"
timestamp = 2024-06-01T00:00:00Z

[[items]]
content = "msg-c"
tokens = 100
kind = "Message"
timestamp = 2024-01-01T00:00:00Z

[[expected_output]]
content = "msg-a"

[[expected_output]]
content = "pinned-sys"
