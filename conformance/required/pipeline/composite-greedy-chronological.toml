[test]
name = "Pipeline: composite scorer with greedy slice and chronological placement"
stage = "pipeline"

# Tests composite scoring (recency + kind) through the full pipeline.
# Budget: target=350, max=1000, reserve=0.
#
# Composite: recency (weight 1.0) + kind (weight 1.0)
# Normalized weights: 0.5 each.
#
# Items (all non-pinned):
#   "sys-old":  kind=SystemPrompt, tokens=100, timestamp=Jan
#   "msg-mid":  kind=Message,      tokens=150, timestamp=Jun
#   "msg-new":  kind=Message,      tokens=150, timestamp=Dec
#   "doc-old":  kind=Document,     tokens=200, timestamp=Feb
#
# Recency scores (countWithTimestamp=4, denom=3):
#   sys-old (Jan): rank 0 → 0.0
#   doc-old (Feb): rank 1 → 1/3 ≈ 0.333
#   msg-mid (Jun): rank 2 → 2/3 ≈ 0.667
#   msg-new (Dec): rank 3 → 1.0
#
# Kind scores (default weights):
#   sys-old (SystemPrompt): 1.0
#   msg-mid (Message): 0.2
#   msg-new (Message): 0.2
#   doc-old (Document): 0.4
#
# Composite (0.5 * recency + 0.5 * kind):
#   sys-old: 0.5 * 0.0   + 0.5 * 1.0 = 0.5
#   msg-mid: 0.5 * 0.667 + 0.5 * 0.2 = 0.4333
#   msg-new: 0.5 * 1.0   + 0.5 * 0.2 = 0.6
#   doc-old: 0.5 * 0.333 + 0.5 * 0.4 = 0.3667
#
# Sort: msg-new(0.6), sys-old(0.5), msg-mid(0.433), doc-old(0.367)
#
# Slice (Greedy, target=350):
#   Densities:
#     msg-new: 0.6/150 = 0.004
#     sys-old: 0.5/100 = 0.005
#     msg-mid: 0.433/150 ≈ 0.00289
#     doc-old: 0.367/200 ≈ 0.00183
#   Sorted by density: sys-old(0.005), msg-new(0.004), msg-mid(0.00289), doc-old(0.00183)
#   Fill: sys-old(remaining=250), msg-new(remaining=100), msg-mid(150>100 skip), doc-old(200>100 skip)
#   Selected: sys-old, msg-new
#
# Place (Chronological):
#   sys-old (Jan) before msg-new (Dec).
#   Result: [sys-old, msg-new]

[budget]
max_tokens = 1000
target_tokens = 350
output_reserve = 0

[config]
slicer = "greedy"
placer = "chronological"
deduplication = true

[[config.scorers]]
type = "recency"
weight = 1.0

[[config.scorers]]
type = "kind"
weight = 1.0

[[items]]
content = "sys-old"
tokens = 100
kind = "SystemPrompt"
timestamp = 2024-01-01T00:00:00Z

[[items]]
content = "msg-mid"
tokens = 150
kind = "Message"
timestamp = 2024-06-01T00:00:00Z

[[items]]
content = "msg-new"
tokens = 150
kind = "Message"
timestamp = 2024-12-01T00:00:00Z

[[items]]
content = "doc-old"
tokens = 200
kind = "Document"
timestamp = 2024-02-01T00:00:00Z

[[expected_output]]
content = "sys-old"

[[expected_output]]
content = "msg-new"
