[test]
name = "CountQuotaSlice: baseline count satisfaction — require 2 of kind tool, 3 candidates"
stage = "slicing"
slicer = "count_quota"

# Budget: 1000 tokens. Each item = 100 tokens.
# Policy: require_count=2, cap_count=4 for kind "tool".
#
# Phase 1 (Count-Satisfy): commits top-2 by score → tool-a (0.9) + tool-b (0.7).
#   pre_alloc_tokens = 200. residual budget = 800.
#
# Phase 2 (Budget-Distribute): remaining = [tool-c (0.5, 100t)].
#   GreedySlice selects tool-c (fits in 800-token residual).
#
# Cap enforcement: selected_count["tool"] = 3. cap = 4. All pass.
#
# Expected: all 3 items selected. No shortfalls. No cap exclusions.

[config]
inner_slicer = "greedy"
scarcity_behavior = "degrade"

[[config.entries]]
kind = "tool"
require_count = 2
cap_count = 4

[budget]
target_tokens = 1000

[[scored_items]]
content = "tool-a"
tokens = 100
score = 0.9
kind = "tool"

[[scored_items]]
content = "tool-b"
tokens = 100
score = 0.7
kind = "tool"

[[scored_items]]
content = "tool-c"
tokens = 100
score = 0.5
kind = "tool"

[expected]
selected_contents = ["tool-a", "tool-b", "tool-c"]
