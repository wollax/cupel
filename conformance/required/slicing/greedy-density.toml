[test]
name = "GreedySlice selects items by value density"
stage = "slicing"
slicer = "greedy"

# Budget: 300 tokens.
# Items (pre-scored, in score-descending order from Sort stage):
#   "high-score-big":    tokens=400, score=0.9 → density = 0.9/400 = 0.00225
#   "medium-score-small": tokens=100, score=0.7 → density = 0.7/100 = 0.007
#   "low-score-small":   tokens=100, score=0.5 → density = 0.5/100 = 0.005
#   "tiny-score-medium": tokens=200, score=0.1 → density = 0.1/200 = 0.0005
#
# Sorted by density descending:
#   medium-score-small (0.007), low-score-small (0.005),
#   high-score-big (0.00225), tiny-score-medium (0.0005)
#
# Greedy fill (300 remaining):
#   medium-score-small: 100 <= 300 → selected, remaining = 200
#   low-score-small: 100 <= 200 → selected, remaining = 100
#   high-score-big: 400 > 100 → skipped
#   tiny-score-medium: 200 > 100 → skipped

[budget]
target_tokens = 300

[[scored_items]]
content = "high-score-big"
tokens = 400
score = 0.9

[[scored_items]]
content = "medium-score-small"
tokens = 100
score = 0.7

[[scored_items]]
content = "low-score-small"
tokens = 100
score = 0.5

[[scored_items]]
content = "tiny-score-medium"
tokens = 200
score = 0.1

[expected]
selected_contents = ["medium-score-small", "low-score-small"]
