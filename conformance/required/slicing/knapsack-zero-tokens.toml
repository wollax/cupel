[test]
name = "KnapsackSlice pre-filters zero-token items"
stage = "slicing"
slicer = "knapsack"

# Zero-token items are always included and do not participate in the DP.
# Budget: 200 tokens, bucket_size: 100
#
# Items:
#   "zero":   tokens=0, score=0.1 → pre-filtered, always included
#   "fits":   tokens=200, score=0.6 → value=6000, dw=ceil(200/100)=2
#   "no-fit": tokens=300, score=0.9 → value=9000, dw=ceil(300/100)=3
#
# Capacity = floor(200/100) = 2
# DP with candidates [fits, no-fit]:
#   fits: dw=2, at w=2: dp[0]+6000=6000 > 0 → dp[2]=6000, keep[0][2]=true
#   no-fit: dw=3 > capacity=2 → skipped entirely
#
# Reconstruct: keep[1][2]=false, keep[0][2]=true → "fits"
# Result: ["zero", "fits"]

[config]
bucket_size = 100

[budget]
target_tokens = 200

[[scored_items]]
content = "zero"
tokens = 0
score = 0.1

[[scored_items]]
content = "fits"
tokens = 200
score = 0.6

[[scored_items]]
content = "no-fit"
tokens = 300
score = 0.9

[expected]
selected_contents = ["zero", "fits"]
