[test]
name = "CountQuotaSlice: cap exclusion — cap_count=1 for kind tool, 3 candidates; 2 excluded by cap"
stage = "slicing"
slicer = "count_quota"

# Budget: 1000 tokens. Each item = 100 tokens.
# Policy: require_count=0, cap_count=1 for kind "tool".
#
# Phase 1 (Count-Satisfy): require_count=0 → nothing committed. pre_alloc = 0.
#   residual budget = 1000.
#
# Phase 2 (Budget-Distribute): all 3 items passed to GreedySlice.
#   GreedySlice selects tool-a (0.9), tool-b (0.7), tool-c (0.5) — all fit in 1000t.
#
# Cap enforcement: selected_count starts at 0.
#   tool-a: count=0 < cap=1 → pass. count becomes 1.
#   tool-b: count=1 >= cap=1 → excluded.
#   tool-c: count=1 >= cap=1 → excluded.
#
# Expected: 1 item selected (tool-a). cap_excluded_count = 2. No shortfalls.

[config]
inner_slicer = "greedy"
scarcity_behavior = "degrade"

[[config.entries]]
kind = "tool"
require_count = 0
cap_count = 1

[budget]
target_tokens = 1000

[[scored_items]]
content = "tool-a"
tokens = 100
score = 0.9
kind = "tool"

[[scored_items]]
content = "tool-b"
tokens = 100
score = 0.7
kind = "tool"

[[scored_items]]
content = "tool-c"
tokens = 100
score = 0.5
kind = "tool"

[expected]
selected_contents = ["tool-a"]
shortfall_count = 0
cap_excluded_count = 2
