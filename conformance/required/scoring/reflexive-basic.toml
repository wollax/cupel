[test]
name = "ReflexiveScorer passes through futureRelevanceHint clamped to [0,1]"
stage = "scoring"
scorer = "reflexive"

# Values within [0,1] pass through directly.
# Values outside [0,1] are clamped.

[[items]]
content = "zero"
tokens = 100
futureRelevanceHint = 0.0

[[items]]
content = "half"
tokens = 100
futureRelevanceHint = 0.5

[[items]]
content = "one"
tokens = 100
futureRelevanceHint = 1.0

[[items]]
content = "over"
tokens = 100
futureRelevanceHint = 1.5

[[items]]
content = "under"
tokens = 100
futureRelevanceHint = -0.3

[[expected]]
content = "zero"
score_approx = 0.0

[[expected]]
content = "half"
score_approx = 0.5

[[expected]]
content = "one"
score_approx = 1.0

[[expected]]
content = "over"
score_approx = 1.0

[[expected]]
content = "under"
score_approx = 0.0

[tolerance]
score_epsilon = 1e-9
