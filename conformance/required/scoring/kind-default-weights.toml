[test]
name = "KindScorer returns default weights for known kinds"
stage = "scoring"
scorer = "kind"

# Default weights: SystemPrompt=1.0, Memory=0.8, ToolOutput=0.6, Document=0.4, Message=0.2

[config]
use_default_weights = true

[[items]]
content = "system prompt"
tokens = 100
kind = "SystemPrompt"

[[items]]
content = "memory"
tokens = 100
kind = "Memory"

[[items]]
content = "tool output"
tokens = 100
kind = "ToolOutput"

[[items]]
content = "document"
tokens = 100
kind = "Document"

[[items]]
content = "message"
tokens = 100
kind = "Message"

[[expected]]
content = "system prompt"
score_approx = 1.0

[[expected]]
content = "memory"
score_approx = 0.8

[[expected]]
content = "tool output"
score_approx = 0.6

[[expected]]
content = "document"
score_approx = 0.4

[[expected]]
content = "message"
score_approx = 0.2

[tolerance]
score_epsilon = 1e-9
