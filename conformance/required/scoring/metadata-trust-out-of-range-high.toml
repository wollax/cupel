[test]
name = "MetadataTrustScorer: cupel:trust value > 1.0 → score clamped to 1.0"
stage = "scoring"
scorer = "metadata_trust"

[[items]]
content = "over-trust-item"
tokens = 10
metadata = { "cupel:trust" = "1.5" }

[[expected]]
content = "over-trust-item"
score_approx = 1.0

[tolerance]
score_epsilon = 1e-9

[config]
default_score = 0.5
