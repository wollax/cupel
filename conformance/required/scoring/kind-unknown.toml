[test]
name = "KindScorer returns 0.0 for unknown kind"
stage = "scoring"
scorer = "kind"

# An item with a kind not in the default weight map should score 0.0.

[config]
use_default_weights = true

[[items]]
content = "known kind"
tokens = 100
kind = "SystemPrompt"

[[items]]
content = "unknown kind"
tokens = 100
kind = "CustomKind"

[[expected]]
content = "known kind"
score_approx = 1.0

[[expected]]
content = "unknown kind"
score_approx = 0.0

[tolerance]
score_epsilon = 1e-9
